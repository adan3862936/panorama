<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>勝利室內裝修 · 現場全景帶看</title>
<style>
  :root{--bg:#11131a;--card:#1b1f29;--line:#2a2f3a;--text:#eceef3;--muted:#9aa2b1;--accent:#e8a33d;}
  *{box-sizing:border-box;}
  html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);
    font-family:"Noto Sans TC","PingFang TC",system-ui,sans-serif;}
  .wrap{max-width:760px;margin:0 auto;padding:32px 20px 60px;}
  header{display:flex;flex-direction:column;gap:4px;padding:14px 0 24px;border-bottom:1px solid var(--line);}
  header b{font-size:20px;letter-spacing:.5px;}
  header b span{color:var(--accent);}
  header small{color:var(--muted);font-size:13px;}
  h2{font-size:14px;color:var(--muted);font-weight:600;letter-spacing:1px;margin:28px 0 12px;}
  .tour{display:flex;align-items:center;gap:16px;background:var(--card);border:1px solid var(--line);
    border-radius:14px;padding:16px 18px;text-decoration:none;color:inherit;transition:.15s;margin-bottom:12px;}
  .tour:hover{border-color:var(--accent);transform:translateY(-1px);}
  .tour .ico{width:54px;height:54px;border-radius:12px;background:var(--accent);color:#1a1205;
    display:flex;align-items:center;justify-content:center;font-size:26px;flex:0 0 auto;}
  .tour .meta{flex:1;min-width:0;}
  .tour .name{font-size:17px;font-weight:700;}
  .tour .sub{font-size:13px;color:var(--muted);margin-top:2px;}
  .tour .go{color:var(--accent);font-size:22px;}
  footer{margin-top:40px;color:var(--muted);font-size:12px;line-height:1.7;text-align:center;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <b>勝利室內裝修 <span>·</span> 現場全景帶看</b>
    <small>點下方案場，用手機拖曳即可 360 度查看現場；點「🗺 平面圖」可從平面圖跳到各空間。</small>
  </header>

  <h2>案場列表（1）</h2>
  <a class="tour" href="測試屋/">
    <div class="ico">🏠</div>
    <div class="meta">
      <div class="name">測試屋（含平面圖）</div>
      <div class="sub">5 個空間 · 客廳／走道／廚房／臥室 · 測試用</div>
    </div>
    <div class="go">›</div>
  </a>

  <footer>
    勝利室內裝修工作室 · 謝佑祥｜設計總監<br/>
    www.winning0602.com · LINE @winning
  </footer>
</div>
</body>
</html>
